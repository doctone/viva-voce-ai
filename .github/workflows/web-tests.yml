name: Web Tests

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/web-tests.yml'
      - '.github/workflows/deploy-cloudflare.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run web tests
        run: pnpm --filter web test
